# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Астария
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: false
  analytics: {}
  locale: ru-RU
  baseUrl: losferwords.github.io/astaria
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Alegreya SC
      body: Alegreya
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#fbfaf7"
        lightgray: "#e8e3da"
        gray: "#b8b0a4"
        darkgray: "#5a534a"
        dark: "#282520"
        secondary: "#7a3f37"
        tertiary: "#3d7568"
        highlight: rgba(122, 63, 55, 0.12)
        textHighlight: "#f3d77a66"
      darkMode:
        light: "#171717"
        lightgray: "#32302c"
        gray: "#6d675e"
        darkgray: "#d8d0c4"
        dark: "#f2eee7"
        secondary: "#d58b73"
        tertiary: "#88c7b2"
        highlight: rgba(213, 139, 115, 0.16)
        textHighlight: "#d5a84d55"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - filesystem
        - git
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      comments: true
      highlight: true
      wikilinks: true
      callouts: true
      mermaid: true
      parseTags: false
      parseArrows: true
      parseBlockReferences: true
      enableInHtmlEmbed: false
      enableYouTubeEmbed: true
      enableVideoEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    options:
      linkHeadings: false
    order: 40
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: false
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/hard-line-breaks
    enabled: true
    order: 90
  - source: github:quartz-community/fonts
    enabled: false
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: false
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: false
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/darkmode
    enabled: false
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: false
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/graph
    enabled: false
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/backlinks
    enabled: false
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/breadcrumbs
    enabled: false
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/article-title
    enabled: false
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: false
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/page-title
    enabled: false
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/spacer
    enabled: false
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - title
        - type
        - category
        - tags
      excludedProperties: []
      hidePropertiesView: true
      delimiters: "---"
      language: yaml
    order: 5
    layout:
      position: afterBody
      priority: 20
  - source: github:quartz-community/footer
    enabled: false
    options:
      links:
        GitHub: https://github.com/losferwords/astaria
