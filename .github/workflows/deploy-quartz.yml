name: Deploy Astaria Quartz site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: _quartz/package-lock.json

      - name: Prepare public content
        run: ruby _scripts/sync_quartz_content.rb

      - name: Install dependencies
        working-directory: _quartz
        run: npm ci

      - name: Install Quartz plugins
        working-directory: _quartz
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node quartz/bootstrap-cli.mjs plugin install --from-config

      - name: Build Quartz
        working-directory: _quartz
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node quartz/bootstrap-cli.mjs build -d content -o public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
